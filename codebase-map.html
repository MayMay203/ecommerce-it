<!DOCTYPE html>
<html><head>
  <meta charset="utf-8"><title>Codebase Explorer</title>
  <style>
    body { font: 14px/1.5 system-ui, sans-serif; margin: 0; background: #1a1a2e; color: #eee; }
    .container { display: flex; height: 100vh; }
    .sidebar { width: 280px; background: #252542; padding: 20px; border-right: 1px solid #3d3d5c; overflow-y: auto; flex-shrink: 0; }
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    h1 { margin: 0 0 10px 0; font-size: 18px; }
    h2 { margin: 20px 0 10px 0; font-size: 14px; color: #888; text-transform: uppercase; }
    .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #3d3d5c; }
    .stat-value { font-weight: bold; }
    .bar-row { display: flex; align-items: center; margin: 6px 0; }
    .bar-label { width: 55px; font-size: 12px; color: #aaa; }
    .bar { height: 18px; border-radius: 3px; }
    .bar-pct { margin-left: 8px; font-size: 12px; color: #666; }
    .tree { list-style: none; padding-left: 20px; }
    details { cursor: pointer; }
    summary { padding: 4px 8px; border-radius: 4px; }
    summary:hover { background: #2d2d44; }
    .folder { color: #ffd700; }
    .file { display: flex; align-items: center; padding: 4px 8px; border-radius: 4px; }
    .file:hover { background: #2d2d44; }
    .size { color: #888; margin-left: auto; font-size: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
  </style>
</head><body>
  <div class="container">
    <div class="sidebar">
      <h1>📊 Summary</h1>
      <div class="stat"><span>Files</span><span class="stat-value">17</span></div>
      <div class="stat"><span>Directories</span><span class="stat-value">3</span></div>
      <div class="stat"><span>Total size</span><span class="stat-value">271.5 KB</span></div>
      <div class="stat"><span>File types</span><span class="stat-value">5</span></div>
      <h2>By file type</h2>
      <div class="bar-row"><span class="bar-label">.lock</span><div class="bar" style="width:84.9787630415784%;background:#6b7280"></div><span class="bar-pct">85.0%</span></div><div class="bar-row"><span class="bar-label">.md</span><div class="bar" style="width:12.686430284873747%;background:#083fa1"></div><span class="bar-pct">12.7%</span></div><div class="bar-row"><span class="bar-label">.json</span><div class="bar" style="width:1.1630876127932444%;background:#6b7280"></div><span class="bar-pct">1.2%</span></div><div class="bar-row"><span class="bar-label">.ts</span><div class="bar" style="width:0.8358118775916822%;background:#3178c6"></div><span class="bar-pct">0.8%</span></div><div class="bar-row"><span class="bar-label">.mjs</span><div class="bar" style="width:0.3359071831629222%;background:#6b7280"></div><span class="bar-pct">0.3%</span></div>
    </div>
    <div class="main">
      <h1>📁 backend-nest-amazon</h1>
      <ul class="tree" id="root"></ul>
    </div>
  </div>
  <script>
    const data = {"name": "backend-nest-amazon", "children": [{"name": "CLAUDE.md", "size": 10204, "ext": ".md"}, {"name": "docs", "children": [{"name": "BE-ARCHITECTURE.md", "size": 10452, "ext": ".md"}, {"name": "BE-PROJECT-RULES.md", "size": 9485, "ext": ".md"}], "size": 19937}, {"name": "eslint.config.mjs", "size": 934, "ext": ".mjs"}, {"name": "nest-cli.json", "size": 179, "ext": ".json"}, {"name": "package.json", "size": 2060, "ext": ".json"}, {"name": "README.md", "size": 5134, "ext": ".md"}, {"name": "src", "children": [{"name": "app.controller.spec.ts", "size": 639, "ext": ".ts"}, {"name": "app.controller.ts", "size": 286, "ext": ".ts"}, {"name": "app.module.ts", "size": 259, "ext": ".ts"}, {"name": "app.service.ts", "size": 150, "ext": ".ts"}, {"name": "main.ts", "size": 236, "ext": ".ts"}], "size": 1570}, {"name": "test", "children": [{"name": "app.e2e-spec.ts", "size": 754, "ext": ".ts"}, {"name": "jest-e2e.json", "size": 192, "ext": ".json"}], "size": 946}, {"name": "tsconfig.build.json", "size": 101, "ext": ".json"}, {"name": "tsconfig.json", "size": 702, "ext": ".json"}, {"name": "yarn.lock", "size": 236286, "ext": ".lock"}], "size": 278053};
    const colors = {".js": "#f7df1e", ".ts": "#3178c6", ".py": "#3776ab", ".go": "#00add8", ".rs": "#dea584", ".rb": "#cc342d", ".css": "#264de4", ".html": "#e34c26", ".json": "#6b7280", ".md": "#083fa1", ".yaml": "#cb171e", ".yml": "#cb171e", ".mdx": "#083fa1", ".tsx": "#3178c6", ".jsx": "#61dafb", ".sh": "#4eaa25"};
    function fmt(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b/1024).toFixed(1) + ' KB'; return (b/1048576).toFixed(1) + ' MB'; }
    function render(node, parent) {
      if (node.children) {
        const det = document.createElement('details');
        det.open = parent === document.getElementById('root');
        det.innerHTML = `<summary><span class="folder">📁 ${node.name}</span><span class="size">${fmt(node.size)}</span></summary>`;
        const ul = document.createElement('ul'); ul.className = 'tree';
        node.children.sort((a,b) => (b.children?1:0)-(a.children?1:0) || a.name.localeCompare(b.name));
        node.children.forEach(c => render(c, ul));
        det.appendChild(ul);
        const li = document.createElement('li'); li.appendChild(det); parent.appendChild(li);
      } else {
        const li = document.createElement('li'); li.className = 'file';
        li.innerHTML = `<span class="dot" style="background:${colors[node.ext]||'#6b7280'}"></span>${node.name}<span class="size">${fmt(node.size)}</span>`;
        parent.appendChild(li);
      }
    }
    data.children.forEach(c => render(c, document.getElementById('root')));
  </script>
</body></html>
